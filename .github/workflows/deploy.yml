name: Build & publish to production branch

# On every push to main, build the Vite site and publish ONLY the built output
# (dist/) to the `production` branch. Plesk deploys the `production` branch as
# static files — no Node/npm runs on the server.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: publish-production
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        run: npm run build

      - name: Publish dist/ to production branch
        run: |
          cd dist
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA::7} ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
          git branch -M production
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" production
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
